<h1>Bible</h1>

<ng-container
  *ngIf="(books$ | async) as bible"
>
  <h2>{{version.title}}</h2>

  <div class="row">
    <div class="col-xs-12 col-md-6">
      <h2>Old Testament</h2>
      <ul>
        <li *ngFor="let book of bible.old">
          {{book.title}}
        </li>
      </ul>
    </div>

    <div class="col-xs-12 col-md-6">
      <h2>New Testament</h2>
      <ul>
        <li *ngFor="let book of bible.new">
          {{book.title}}
        </li>
      </ul>
    </div>
  </div>
</ng-container>
