<h1>Bible</h1>

<div class="row">
  <div class="col-xs-12 col-md-6">
    <h2>Old Testament</h2>
    <ul>
      <li *ngFor="let book of (books$ | async).old">
        {{book.title}}
      </li>
    </ul>
  </div>

  <div class="col-xs-12 col-md-6">
    <h2>New Testament</h2>
    <ul>
      <li *ngFor="let book of (books$ | async).new">
        {{book.title}}
      </li>
    </ul>
  </div>
</div>
