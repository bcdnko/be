<div class="row">
  <aside class="col-md-3 col-12 order-2 order-md-1">
    <be-bible-version-selector></be-bible-version-selector>
    <be-bible-book-selector></be-bible-book-selector>
  </aside>

  <main
    *ngIf="bibleState"
    class="col-md-7 col-sm-12 col-12 order-1 order-md-2 page-bg"
  >
    <a
      class="prev-chapter"
      *ngIf="prevChapterLink"
      [routerLink]="prevChapterLink"
    ><div></div></a>
    <div *ngIf="!prevChapterLink" class="prev-chapter"></div>

    <div class="chapter-text">
      <p>{{bibleState.version.title}}</p>

      <h1>{{bibleState.book.title}}</h1>
      <h2>Chapter {{bibleState.chapter}}</h2>

      <div class="chapter-list">
        <span>Chapters:</span>
        <ul>
          <li *ngFor="let chapter of bibleState.book.chaptersArray">
            <a
              *ngIf="chapter.no !== bibleState.chapter"
              [routerLink]="chapter.route"
            >
              {{chapter.no}}
            </a>
            <span
              *ngIf="chapter.no === bibleState.chapter"
              class="active"
            >
              {{chapter.no}}
            </span>
          </li>
        </ul>
      </div>

      <be-bible-chapter-text
        [verses]="verses"
      ></be-bible-chapter-text>
    </div>

    <a
      class="next-chapter"
      *ngIf="nextChapterLink"
      [routerLink]="nextChapterLink"
    ><div></div></a>
    <div *ngIf="!nextChapterLink" class="next-chapter"></div>
  </main>

  <aside class="col-md-2 col-12 order-3"></aside>
</div>
