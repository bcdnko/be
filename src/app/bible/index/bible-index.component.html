<h1>Bible</h1>

<ng-container *ngIf="load$ | async">
  <h2>{{version.title}}</h2>

  <div class="row">
    <div class="col-xs-12 col-md-6">
      <h2>Old Testament</h2>
      <ul>
        <li *ngFor="let book of books.old">
          <a [routerLink]="urlService.bibleBook(version.id, book.id)">
            {{book.title}}
          </a>
        </li>
      </ul>
    </div>

    <div class="col-xs-12 col-md-6">
      <h2>New Testament</h2>
      <ul>
        <li *ngFor="let book of books.new">
          <a [routerLink]="urlService.bibleBook(version.id, book.id)">
            {{book.title}}
          </a>
        </li>
      </ul>
    </div>
  </div>
</ng-container>
