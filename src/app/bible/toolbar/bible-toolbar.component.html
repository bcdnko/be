<ng-container *ngIf="settings">
  <div class="btn-group btn-group-toggle">
    <label
      class="btn-primary"
      title="Enable/Disable Strong Numbers"
      ngbButtonLabel
    >
      <input
        type="checkbox"
        [(ngModel)]="settings.bible.showStrong"
        (ngModelChange)="updateSettings()"
        ngbButton
      > Strong
    </label>

    <button
      class="btn btn-primary"
      (click)="openSettings()"
    >Settings</button>

  </div>
</ng-container>
